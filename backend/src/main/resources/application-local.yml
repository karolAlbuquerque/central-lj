# Perfil opcional: subir o backend SEM PostgreSQL no Docker (ex.: conflito de porta ou teste rápido).
# Uso: mvn spring-boot:run -Dspring-boot.run.profiles=local
# Kafka continua em localhost:9092 se quiser o fluxo completo N2.
spring:
  datasource:
    url: jdbc:h2:mem:central_lj_local;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        globally_quoted_identifiers: true
  flyway:
    enabled: false
