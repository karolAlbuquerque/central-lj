server:
  port: 8080

spring:
  application:
    name: central-lj-backend
  datasource:
    # Padrão alinha ao Compose: Postgres publicado em localhost:5433 (ver infra/docker-compose.yml).
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5433/central_lj}
    username: ${DATABASE_USER:central_lj}
    password: ${DATABASE_PASSWORD:central_lj}
    hikari:
      maximum-pool-size: 10
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_GROUP_ID:central-lj-backend}
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    listener:
      missing-topics-fatal: false

central-lj:
  security:
    enabled: true
    jwt:
      secret: ${JWT_SECRET:central-lj-dev-secret-min-32b-long-key!!!}
      expiration-hours: 48
  auth:
    demo-seed: true
  kafka:
    topic: ${CENTRAL_LJ_KAFKA_TOPIC:missions.events}
    topic-created: ${CENTRAL_LJ_KAFKA_TOPIC_CREATED:missions.created}
    consumer-enabled: true
    workflow-step-delay-ms: ${CENTRAL_LJ_WORKFLOW_STEP_DELAY_MS:200}
  cors:
    # Padrões cobrem qualquer porta em dev (Vite pode mudar; IPv6 [::1] incluído no default do código).
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
      - http://[::1]:*

management:
  endpoints:
    web:
      exposure:
        include: health,info
